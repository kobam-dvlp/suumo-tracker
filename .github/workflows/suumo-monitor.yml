name: SUUMO物件監視
'on':
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: SUUMOスクリプト実行
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GH_PAT: ${{ secrets.GITHUB_PAT }}
        run: python scripts/fetch_suumo.py
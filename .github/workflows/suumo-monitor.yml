name: SUUMO物件監視
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: SUUMOスクリプト実行
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/fetch_suumo.py
      - name: seen_ids.json をコミット
        run: |
          git config user.email "suumo-tracker@bot"
          git config user.name "SUUMO Tracker Bot"
          git add data/seen_ids.json
          git diff --staged --quiet || git commit -m "chore: update seen listings [skip ci]"
          git push
